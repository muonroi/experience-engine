<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Cascadia Code','Fira Code','Consolas',monospace" font-size="13">
  <style>
    .bg { fill: #1e1e2e; }
    .title { fill: #89b4fa; font-weight: bold; font-size: 15px; }
    .prompt { fill: #a6e3a1; }
    .cmd { fill: #cdd6f4; }
    .key { fill: #89b4fa; }
    .val-str { fill: #a6e3a1; }
    .val-num { fill: #f9e2af; }
    .val-bool { fill: #f9e2af; }
    .warn { fill: #f38ba8; font-weight: bold; }
    .comment { fill: #6c7086; }
    .highlight { fill: #a6e3a1; font-weight: bold; }
    .section { fill: #f9e2af; font-weight: bold; }
    .dim { fill: #6c7086; }

    @keyframes fade1 { 0%,8% { opacity:0 } 10%,100% { opacity:1 } }
    @keyframes fade2 { 0%,18% { opacity:0 } 20%,100% { opacity:1 } }
    @keyframes fade3 { 0%,35% { opacity:0 } 37%,100% { opacity:1 } }
    @keyframes fade4 { 0%,55% { opacity:0 } 57%,100% { opacity:1 } }
    @keyframes fade5 { 0%,72% { opacity:0 } 74%,100% { opacity:1 } }
    @keyframes fade6 { 0%,88% { opacity:0 } 90%,100% { opacity:1 } }

    .s1 { animation: fade1 20s infinite; }
    .s2 { animation: fade2 20s infinite; }
    .s3 { animation: fade3 20s infinite; }
    .s4 { animation: fade4 20s infinite; }
    .s5 { animation: fade5 20s infinite; }
    .s6 { animation: fade6 20s infinite; }
  </style>

  <rect class="bg" width="800" height="520" rx="8"/>

  <!-- Window chrome -->
  <circle cx="20" cy="15" r="6" fill="#f38ba8"/>
  <circle cx="38" cy="15" r="6" fill="#f9e2af"/>
  <circle cx="56" cy="15" r="6" fill="#a6e3a1"/>
  <text x="400" y="18" text-anchor="middle" class="dim" font-size="12">Experience Engine Demo</text>

  <!-- Title -->
  <g class="s1">
    <text x="20" y="50" class="title"># Experience Engine — AI agents that learn from mistakes</text>
  </g>

  <!-- Server start -->
  <g class="s1">
    <text x="20" y="75"><tspan class="prompt">$ </tspan><tspan class="cmd">node server.js</tspan></text>
    <text x="20" y="92" class="dim">Experience Engine API running on http://localhost:8082</text>
  </g>

  <!-- Intercept -->
  <g class="s2">
    <text x="20" y="120" class="section">--- Agent about to write src/Startup.cs ---</text>
    <text x="20" y="140"><tspan class="prompt">$ </tspan><tspan class="cmd">curl -s localhost:8082/api/intercept \</tspan></text>
    <text x="30" y="155" class="cmd">-d '{"toolName":"Write","toolInput":{"file_path":"src/Startup.cs"}}'</text>
  </g>

  <g class="s3">
    <text x="20" y="180" class="cmd">{</text>
    <text x="30" y="196"><tspan class="key">"suggestions"</tspan><tspan class="cmd">: </tspan><tspan class="val-str">"⚠️ [High Confidence 0.85]: Stateful objects</tspan></text>
    <text x="30" y="212"><tspan class="val-str">    must be scoped, never singleton"</tspan><tspan class="cmd">,</tspan></text>
    <text x="30" y="228"><tspan class="key">"hasSuggestions"</tspan><tspan class="cmd">: </tspan><tspan class="val-bool">true</tspan></text>
    <text x="20" y="244" class="cmd">}</text>
    <text x="20" y="268" class="warn">  ^ Agent AVOIDED the mistake. No 15-min debug session.</text>
  </g>

  <!-- Evolution -->
  <g class="s4">
    <text x="20" y="296" class="section">--- Evolution: cluster → abstract → principles ---</text>
    <text x="20" y="316"><tspan class="prompt">$ </tspan><tspan class="cmd">curl -s -X POST localhost:8082/api/evolve</tspan></text>
    <text x="20" y="336" class="cmd">{</text>
    <text x="30" y="352"><tspan class="key">"promoted"</tspan><tspan class="cmd">: </tspan><tspan class="val-num">2</tspan><tspan class="cmd">, </tspan><tspan class="key">"abstracted"</tspan><tspan class="cmd">: </tspan><tspan class="val-num">1</tspan><tspan class="cmd">, </tspan><tspan class="key">"archived"</tspan><tspan class="cmd">: </tspan><tspan class="val-num">3</tspan></text>
    <text x="20" y="368" class="cmd">}</text>
  </g>

  <g class="s5">
    <text x="20" y="392" class="highlight">  3 specific entries → 1 general principle</text>
    <text x="20" y="410" class="highlight">  Memory shrinks. Capability grows.</text>
  </g>

  <!-- Stats -->
  <g class="s5">
    <text x="20" y="438" class="section">--- Stats (30 days) ---</text>
    <text x="20" y="456" class="cmd">  Suggestions: 47  |  Hit rate: 68%  |  Mistakes avoided: 12</text>
    <text x="20" y="472" class="cmd">  Principles: 5    |  Learning velocity: +3/week</text>
  </g>

  <!-- Footer -->
  <g class="s6">
    <text x="20" y="500" class="title">  Zero deps. Works offline. MIT. github.com/muonroi/experience-engine</text>
  </g>
</svg>
