name: Deploy VPS

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: experience-engine-vps
  cancel-in-progress: true

env:
  PROD_HOST: ${{ secrets.VPS_HOST }}
  PROD_PORT: ${{ secrets.VPS_PORT }}
  PROD_USER: ${{ secrets.VPS_USER }}
  TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
  TS_TAGS: ${{ secrets.TS_TAGS }}
  HAS_TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY != '' }}
  HAS_TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET != '' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: CI test suite
        run: npm run test:ci

      - name: Validate deployment secrets
        env:
          HAS_VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY != '' }}
        run: |
          set -euo pipefail
          missing=0
          if [ -z "$PROD_HOST" ]; then
            echo "::error::Missing required secret VPS_HOST"
            missing=1
          fi
          if [ -z "$PROD_USER" ]; then
            echo "::error::Missing required secret VPS_USER"
            missing=1
          fi
          if [ "$HAS_VPS_SSH_PRIVATE_KEY" != "true" ]; then
            echo "::error::Missing required secret VPS_SSH_PRIVATE_KEY"
            missing=1
          fi
          if [ "$HAS_TAILSCALE_AUTHKEY" != "true" ] && { [ -z "$TS_OAUTH_CLIENT_ID" ] || [ "$HAS_TS_OAUTH_SECRET" != "true" ] || [ -z "$TS_TAGS" ]; }; then
            echo "::error::Missing Tailscale credentials. Set TAILSCALE_AUTHKEY, or set TS_OAUTH_CLIENT_ID, TS_OAUTH_SECRET, and TS_TAGS."
            missing=1
          fi
          exit "$missing"

      - name: Connect to Tailscale with OAuth
        if: ${{ env.HAS_TAILSCALE_AUTHKEY == 'false' && env.TS_OAUTH_CLIENT_ID != '' && env.HAS_TS_OAUTH_SECRET == 'true' && env.TS_TAGS != '' }}
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: ${{ secrets.TS_TAGS }}

      - name: Connect to Tailscale with auth key
        if: ${{ env.HAS_TAILSCALE_AUTHKEY == 'true' }}
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Deploy to VPS
        env:
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ssh -p "${PROD_PORT:-22}" -o StrictHostKeyChecking=no "${PROD_USER}@${PROD_HOST}" \
            DEPLOY_BRANCH="$DEPLOY_BRANCH" \
            'bash -se' <<'EOF'
          set -euo pipefail
          cd "$HOME/experience-engine"
          bash scripts/deploy-vps.sh
          EOF

      - name: Disconnect Tailscale
        if: always()
        run: |
          set +e
          if command -v tailscale >/dev/null 2>&1; then
            sudo tailscale logout || sudo tailscale down || true
          fi
